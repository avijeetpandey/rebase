spring.application.name=rebase

# Stable Page serialization (avoids PageImpl warning)
spring.data.web.pageable.default-page-size=20

# DB configurations
spring.datasource.url=jdbc:postgresql://localhost:5432/rebase
spring.datasource.username=rebase
spring.datasource.password=rebase


# Connection pool settings
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging settings
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Security settings
security.jwt.secret=replace-with-a-very-long-secret-key-at-least-32-characters
security.jwt.access-token-expiry-ms=900000
security.session.expiry-hours=168

# Server
server.port=9000

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# MinIO configurations
minio.url=http://localhost:9002
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=rebase-bucket
