version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rebase-postgres
    restart: always
    environment:
      POSTGRES_USER: rebase
      POSTGRES_PASSWORD: rebase
      POSTGRES_DB: rebase
    ports:
      - "5432:5432"
    volumes:
      - rebase_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebase -d rebase"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rebase_pg_data: